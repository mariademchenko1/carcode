<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет | CarCode</title>
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.19/index.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/raleway@5.0.19/index.css" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0f;
      --bg-card: #13131a;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --accent-glow: rgba(59, 130, 246, 0.28);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --success: #4ade80;
      --danger: #f87171;
      --warning: #facc15;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --font-heading: 'Raleway', sans-serif;
      --font-body: 'Inter', sans-serif;
      --transition: all 0.25s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(10, 10, 15, 0.9), rgba(10, 10, 15, 0.97)),
        url("https://image.qwenlm.ai/public_source/b2131477-915a-4267-9931-3fe73d42285e/173d8835c-aba0-451f-83bb-af1821ccbf49.png") center/cover fixed no-repeat;
      color: var(--text-main);
      font-family: var(--font-body);
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }
    .container { max-width: 1180px; margin: 0 auto; padding: 0 24px; }
    .hidden { display: none !important; }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(10, 10, 15, 0.94);
      border-bottom: 1px solid var(--border-subtle);
      backdrop-filter: blur(16px);
    }
    nav {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo-link { display: flex; align-items: center; }
    .logo-img { height: 40px; width: auto; object-fit: contain; }
    .nav-actions { display: flex; align-items: center; gap: 1rem; }
    .nav-link {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
      transition: var(--transition);
    }
    .nav-link:hover { color: #fff; }

    .account-page { padding: 56px 0 80px; }
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    h1, h2, h3 {
      font-family: var(--font-heading);
      line-height: 1.2;
    }
    h1 { font-size: clamp(2rem, 4vw, 3.2rem); margin-bottom: 0.5rem; }
    h2 { font-size: 1.45rem; margin-bottom: 1rem; }
    h3 { font-size: 1rem; margin-bottom: 0.4rem; }
    .muted { color: var(--text-muted); }

    .btn-primary,
    .btn-secondary,
    .btn-danger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: var(--transition);
    }
    .btn-primary {
      width: 100%;
      color: #fff;
      background: var(--accent);
      border: 0;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }
    .btn-secondary {
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border-subtle);
    }
    .btn-secondary:hover { color: #fff; border-color: rgba(255, 255, 255, 0.2); }
    .btn-danger {
      min-height: 36px;
      padding: 8px 12px;
      color: #fff;
      background: rgba(248, 113, 113, 0.14);
      border: 1px solid rgba(248, 113, 113, 0.35);
    }
    .btn-danger:hover { background: rgba(248, 113, 113, 0.24); }

    .auth-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1.5rem;
      align-items: start;
    }
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 2rem;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
    }
    .form-field { margin-bottom: 1rem; }
    label {
      display: block;
      margin-bottom: 0.4rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      color: var(--text-main);
      background: var(--bg-dark);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      outline: none;
      transition: var(--transition);
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-status {
      min-height: 24px;
      margin-top: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .form-status.success { color: var(--success); }
    .form-status.error { color: var(--danger); }

    .dashboard-layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 1.5rem;
      align-items: start;
    }
    .tabs {
      display: grid;
      gap: 0.5rem;
    }
    .tab-btn {
      width: 100%;
      padding: 12px 14px;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      text-align: left;
      cursor: pointer;
      transition: var(--transition);
    }
    .tab-btn:hover,
    .tab-btn.active {
      color: #fff;
      background: rgba(59, 130, 246, 0.12);
      border-color: rgba(59, 130, 246, 0.28);
    }
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .profile-item {
      padding: 1rem;
      background: var(--bg-dark);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
    }
    .profile-item span {
      display: block;
      margin-bottom: 0.25rem;
      color: var(--text-dim);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
    }
    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      background: var(--bg-dark);
    }
    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-subtle);
      text-align: left;
      vertical-align: middle;
    }
    th {
      color: var(--text-muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    tr:last-child td { border-bottom: 0; }
    .status {
      display: inline-flex;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
    }
    .status.confirmed { color: var(--success); background: rgba(74, 222, 128, 0.12); }
    .status.pending { color: var(--warning); background: rgba(250, 204, 21, 0.12); }
    .status.cancelled { color: var(--danger); background: rgba(248, 113, 113, 0.12); }
    .history-list {
      display: grid;
      gap: 0.75rem;
    }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem;
      background: var(--bg-dark);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
    }
    .history-sum {
      color: var(--accent-hover);
      font-weight: 800;
      white-space: nowrap;
    }

    @media (max-width: 820px) {
      .page-header,
      .dashboard-layout,
      .auth-grid {
        grid-template-columns: 1fr;
      }
      .dashboard-layout { display: block; }
      .tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-bottom: 1rem; }
      .tab-btn { text-align: center; }
      .profile-grid { grid-template-columns: 1fr; }
      .panel { padding: 1.25rem; }
    }
    @media (max-width: 560px) {
      nav { align-items: flex-start; flex-direction: column; padding: 16px 0; }
      .nav-actions { width: 100%; justify-content: space-between; }
      .tabs { grid-template-columns: 1fr; }
      .history-item { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <nav class="container">
      <a href="index.html" class="logo-link">
        <img src="https://image.qwenlm.ai/public_source/b2131477-915a-4267-9931-3fe73d42285e/16c17bbdd-d2ae-4312-a008-29e6cc439eb0.png" alt="CarCode" class="logo-img">
      </a>
      <div class="nav-actions">
        <a href="index.html" class="nav-link">На главную</a>
        <a href="booking.html" class="nav-link">Записаться</a>
        <button type="button" class="btn-secondary hidden" id="logoutBtn">Выйти</button>
      </div>
    </nav>
  </header>

  <main class="account-page">
    <div class="container">
      <div class="page-header">
        <div>
          <h1>Личный кабинет</h1>
          <p class="muted">Управляйте профилем, записями на сервис и историей выполненных работ.</p>
        </div>
      </div>

      <section class="auth-grid" id="authSection" aria-label="Вход и регистрация">
        <form class="panel" id="loginForm">
          <h2>Вход</h2>
          <div class="form-field">
            <label for="loginPhone">Телефон</label>
            <input type="tel" id="loginPhone" autocomplete="tel" placeholder="+7 (999) 123-45-67" required>
          </div>
          <div class="form-field">
            <label for="loginPassword">Пароль</label>
            <input type="password" id="loginPassword" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn-primary">Войти</button>
          <div class="form-status" id="loginStatus"></div>
        </form>

        <form class="panel" id="registerForm">
          <h2>Регистрация</h2>
          <div class="form-field">
            <label for="registerName">Имя</label>
            <input type="text" id="registerName" autocomplete="name" placeholder="Иван Иванов" required>
          </div>
          <div class="form-field">
            <label for="registerPhone">Телефон</label>
            <input type="tel" id="registerPhone" autocomplete="tel" placeholder="+7 (999) 123-45-67" required>
          </div>
          <div class="form-field">
            <label for="registerPassword">Пароль</label>
            <input type="password" id="registerPassword" autocomplete="new-password" minlength="6" required>
          </div>
          <div class="form-field">
            <label for="registerPasswordConfirm">Подтверждение пароля</label>
            <input type="password" id="registerPasswordConfirm" autocomplete="new-password" minlength="6" required>
          </div>
          <button type="submit" class="btn-primary">Зарегистрироваться</button>
          <div class="form-status" id="registerStatus"></div>
        </form>
      </section>

      <section class="dashboard-layout hidden" id="dashboardSection" aria-label="Панель личного кабинета">
        <aside class="panel tabs" aria-label="Разделы кабинета">
          <button type="button" class="tab-btn active" data-tab="profileTab">Профиль</button>
          <button type="button" class="tab-btn" data-tab="recordsTab">Мои записи</button>
          <button type="button" class="tab-btn" data-tab="historyTab">История</button>
        </aside>

        <div>
          <section class="panel tab-panel" id="profileTab">
            <h2>Профиль</h2>
            <div class="profile-grid" id="profileView">
              <div class="profile-item">
                <span>Имя</span>
                <strong id="profileNameText"></strong>
              </div>
              <div class="profile-item">
                <span>Телефон</span>
                <strong id="profilePhoneText"></strong>
              </div>
              <div class="profile-item">
                <span>Email</span>
                <strong id="profileEmailText"></strong>
              </div>
            </div>
            <button type="button" class="btn-secondary" id="editProfileBtn">Редактировать</button>

            <form class="hidden" id="profileForm">
              <div class="form-field">
                <label for="profileName">Имя</label>
                <input type="text" id="profileName" required>
              </div>
              <div class="form-field">
                <label for="profilePhone">Телефон</label>
                <input type="tel" id="profilePhone" required>
              </div>
              <div class="form-field">
                <label for="profileEmail">Email (опционально)</label>
                <input type="email" id="profileEmail" placeholder="name@example.com">
              </div>
              <button type="submit" class="btn-primary">Сохранить</button>
              <div class="form-status" id="profileStatus"></div>
            </form>
          </section>

          <section class="panel tab-panel hidden" id="recordsTab">
            <h2>Мои записи</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Услуга</th>
                    <th>Дата</th>
                    <th>Время</th>
                    <th>Статус</th>
                    <th>Действия</th>
                  </tr>
                </thead>
                <tbody id="recordsBody"></tbody>
              </table>
            </div>
          </section>

          <section class="panel tab-panel hidden" id="historyTab">
            <h2>История</h2>
            <div class="history-list" id="historyList"></div>
          </section>
        </div>
      </section>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const storageKey = 'carcodeAccount';
      const sessionKey = 'carcodeAccountSession';
      const authSection = document.getElementById('authSection');
      const dashboardSection = document.getElementById('dashboardSection');
      const logoutBtn = document.getElementById('logoutBtn');
      const loginStatus = document.getElementById('loginStatus');
      const registerStatus = document.getElementById('registerStatus');
      const profileStatus = document.getElementById('profileStatus');

      const defaultRecords = [
        { id: 1, service: 'Компьютерная диагностика', date: '2026-07-02', time: '11:00', status: 'Подтверждена', type: 'confirmed' },
        { id: 2, service: 'Замена масла и фильтров', date: '2026-07-08', time: '15:00', status: 'Ожидает подтверждения', type: 'pending' }
      ];
      const defaultHistory = [
        { service: 'Шиномонтаж и балансировка', date: '2026-05-14', sum: '4 800 ₽' },
        { service: 'Ремонт тормозов', date: '2026-04-22', sum: '12 500 ₽' },
        { service: 'Диагностика ходовой', date: '2026-03-18', sum: '2 500 ₽' }
      ];

      const getAccount = () => JSON.parse(localStorage.getItem(storageKey) || 'null');
      const saveAccount = (account) => localStorage.setItem(storageKey, JSON.stringify(account));
      const setStatus = (element, text, type) => {
        element.textContent = text;
        element.className = `form-status ${type || ''}`;
      };

      function showDashboard() {
        sessionStorage.setItem(sessionKey, 'active');
        authSection.classList.add('hidden');
        dashboardSection.classList.remove('hidden');
        logoutBtn.classList.remove('hidden');
        renderProfile();
        renderRecords();
        renderHistory();
      }

      function showAuth() {
        sessionStorage.removeItem(sessionKey);
        authSection.classList.remove('hidden');
        dashboardSection.classList.add('hidden');
        logoutBtn.classList.add('hidden');
      }

      function renderProfile() {
        const account = getAccount();
        if (!account) return;
        document.getElementById('profileNameText').textContent = account.name;
        document.getElementById('profilePhoneText').textContent = account.phone;
        document.getElementById('profileEmailText').textContent = account.email || 'Не указан';
        document.getElementById('profileName').value = account.name;
        document.getElementById('profilePhone').value = account.phone;
        document.getElementById('profileEmail').value = account.email || '';
      }

      function renderRecords() {
        const account = getAccount();
        const recordsBody = document.getElementById('recordsBody');
        recordsBody.innerHTML = '';
        account.records.forEach((record) => {
          const row = document.createElement('tr');
          const canCancel = record.type !== 'cancelled';
          row.innerHTML = `
            <td>${record.service}</td>
            <td>${record.date}</td>
            <td>${record.time}</td>
            <td><span class="status ${record.type}">${record.status}</span></td>
            <td>${canCancel ? `<button type="button" class="btn-danger" data-cancel="${record.id}">Отменить</button>` : '<span class="muted">Недоступно</span>'}</td>
          `;
          recordsBody.appendChild(row);
        });
      }

      function renderHistory() {
        const account = getAccount();
        const historyList = document.getElementById('historyList');
        historyList.innerHTML = '';
        account.history.forEach((item) => {
          const row = document.createElement('article');
          row.className = 'history-item';
          row.innerHTML = `
            <div>
              <h3>${item.service}</h3>
              <p class="muted">Выполнено: ${item.date}</p>
            </div>
            <div class="history-sum">${item.sum}</div>
          `;
          historyList.appendChild(row);
        });
      }

      document.getElementById('registerForm').addEventListener('submit', (event) => {
        event.preventDefault();
        const password = document.getElementById('registerPassword').value;
        const confirm = document.getElementById('registerPasswordConfirm').value;

        if (password !== confirm) {
          setStatus(registerStatus, 'Пароли не совпадают.', 'error');
          return;
        }

        const account = {
          name: document.getElementById('registerName').value.trim(),
          phone: document.getElementById('registerPhone').value.trim(),
          password,
          email: '',
          records: defaultRecords,
          history: defaultHistory
        };
        saveAccount(account);
        setStatus(registerStatus, 'Регистрация завершена.', 'success');
        showDashboard();
      });

      document.getElementById('loginForm').addEventListener('submit', (event) => {
        event.preventDefault();
        const account = getAccount();
        const phone = document.getElementById('loginPhone').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!account || account.phone !== phone || account.password !== password) {
          setStatus(loginStatus, 'Неверный телефон или пароль.', 'error');
          return;
        }
        setStatus(loginStatus, '', '');
        showDashboard();
      });

      document.getElementById('editProfileBtn').addEventListener('click', () => {
        document.getElementById('profileForm').classList.remove('hidden');
        document.getElementById('editProfileBtn').classList.add('hidden');
      });

      document.getElementById('profileForm').addEventListener('submit', (event) => {
        event.preventDefault();
        const account = getAccount();
        account.name = document.getElementById('profileName').value.trim();
        account.phone = document.getElementById('profilePhone').value.trim();
        account.email = document.getElementById('profileEmail').value.trim();
        saveAccount(account);
        renderProfile();
        setStatus(profileStatus, 'Профиль обновлен.', 'success');
        document.getElementById('profileForm').classList.add('hidden');
        document.getElementById('editProfileBtn').classList.remove('hidden');
      });

      document.getElementById('recordsBody').addEventListener('click', (event) => {
        const button = event.target.closest('[data-cancel]');
        if (!button) return;
        const account = getAccount();
        const recordId = Number(button.dataset.cancel);
        account.records = account.records.map((record) => (
          record.id === recordId
            ? { ...record, status: 'Отменена', type: 'cancelled' }
            : record
        ));
        saveAccount(account);
        renderRecords();
      });

      document.querySelectorAll('.tab-btn').forEach((button) => {
        button.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach((item) => item.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach((panel) => panel.classList.add('hidden'));
          button.classList.add('active');
          document.getElementById(button.dataset.tab).classList.remove('hidden');
        });
      });

      logoutBtn.addEventListener('click', () => showAuth());

      if (getAccount() && sessionStorage.getItem(sessionKey) === 'active') {
        showDashboard();
      }
    });
  </script>
</body>
</html>
